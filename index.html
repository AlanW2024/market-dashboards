<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Dashboards</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 1.5rem;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
    color: #fff;
  }
  .subtitle { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; }
  .section { margin-bottom: 1.5rem; }
  .section-title {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #666;
    margin-bottom: 0.5rem;
    padding-bottom: 0.25rem;
    border-bottom: 1px solid #1a1a2e;
  }
  .card {
    display: block;
    background: #12121a;
    border: 1px solid #1a1a2e;
    border-radius: 10px;
    padding: 0.75rem 1rem;
    margin-bottom: 0.5rem;
    text-decoration: none;
    color: #e0e0e0;
    transition: all 0.2s;
  }
  .card:hover, .card:active {
    background: #1a1a2e;
    border-color: #333;
    transform: translateY(-1px);
  }
  .card-title { font-weight: 500; font-size: 0.95rem; }
  .card-meta { font-size: 0.75rem; color: #666; margin-top: 0.15rem; }
  .badge {
    display: inline-block;
    font-size: 0.65rem;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    margin-right: 0.25rem;
  }
  .badge-us { background: #1a2744; color: #5b9cf6; }
  .badge-hk { background: #2a1a1a; color: #f67b5b; }
  .badge-stock { background: #1a2a1a; color: #5bf68a; }
  .empty { color: #444; font-size: 0.85rem; padding: 1rem; text-align: center; }
  #file-list { margin-top: 1rem; }
  .month-label {
    font-size: 0.7rem;
    color: #555;
    padding: 0.5rem 0 0.25rem;
    margin-top: 0.5rem;
    border-top: 1px solid #1a1a2e;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .badge-jp { background: #2a2a1a; color: #f6d85b; }

  /* Mobile responsive */
  @media (max-width: 480px) {
    body { padding: 1rem 0.75rem; }
    h1 { font-size: 1.25rem; }
    .card { padding: 0.85rem 1rem; min-height: 44px; }
    .card-title { font-size: 0.9rem; }
    .section-title { font-size: 0.7rem; }
  }
  /* FX168 featured card */
  .featured-section { margin-bottom: 1.75rem; }
  .featured-card {
    display: block;
    background: linear-gradient(135deg, #12121a 0%, #1a1a2e 100%);
    border: 1px solid #D4AF37;
    border-radius: 12px;
    padding: 1.1rem 1.25rem;
    text-decoration: none;
    color: #e0e0e0;
    transition: all 0.2s;
    box-shadow: 0 0 16px rgba(212, 175, 55, 0.08);
  }
  .featured-card:hover, .featured-card:active {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(212, 175, 55, 0.22);
  }
  .featured-eyebrow {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    color: #D4AF37;
    text-transform: uppercase;
    margin-bottom: 0.35rem;
    font-family: 'SF Mono', Menlo, monospace;
  }
  .featured-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: #D4AF37;
    margin-bottom: 0.25rem;
  }
  .featured-subtitle { font-size: 0.78rem; color: #999; }
  .featured-stats {
    display: flex;
    gap: 0.9rem;
    margin-top: 0.7rem;
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 0.68rem;
    color: #777;
    flex-wrap: wrap;
  }
  .featured-stats span { white-space: nowrap; }
</style>
</head>
<body>

<h1>📊 Market Dashboards</h1>
<p class="subtitle">手機瀏覽器打開即可查看互動版報告</p>

<div class="featured-section">
  <div class="section-title">🌐 News Intelligence</div>
  <a href="FX168/" class="featured-card">
    <div class="featured-eyebrow">FX168 NEWS INTELLIGENCE</div>
    <div class="featured-title">金融市場新聞情報</div>
    <div class="featured-subtitle">每日自動抓取 · AI 結構化摘要 · 主題/情緒追蹤</div>
    <div class="featured-stats">
      <span id="fx168-total">—</span>
      <span id="fx168-today">—</span>
      <span id="fx168-updated">—</span>
    </div>
  </a>
</div>

<div id="file-list"></div>

<script>
  // Populate FX168 card live stats by parsing FX168/data.js
  fetch('FX168/data.js').then(r => r.ok ? r.text() : null).then(text => {
    if (!text) return;
    try {
      const m = text.match(/window\.FX168_DATA\s*=\s*(\{[\s\S]*?\});?\s*$/);
      if (!m) return;
      const d = JSON.parse(m[1]);
      document.getElementById('fx168-total').textContent = `總 ${d.total} 篇`;
      document.getElementById('fx168-today').textContent = `今日 +${d.today || 0}`;
      const ts = (d.generated_at || '').slice(0, 16).replace('T', ' ');
      document.getElementById('fx168-updated').textContent = ts ? `更新於 ${ts}` : '';
    } catch (e) { /* silent */ }
  }).catch(() => {});
</script>

<script src="files.js"></script>
<script>
const container = document.getElementById('file-list');

if (typeof FILES !== 'undefined' && Object.keys(FILES).length > 0) {
  for (const [section, items] of Object.entries(FILES)) {
    if (items.length === 0) continue;
    const div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = `<div class="section-title">${section}</div>`;
    items.sort((a, b) => b.name.localeCompare(a.name));
    let currentMonth = null;
    for (const item of items) {
      // Insert month separator for archived items
      const month = item.month || null;
      if (month && month !== currentMonth) {
        currentMonth = month;
        const label = document.createElement('div');
        label.className = 'month-label';
        label.textContent = `📁 ${month}`;
        div.appendChild(label);
      } else if (!month && currentMonth !== '__current__') {
        currentMonth = '__current__';
      }
      const a = document.createElement('a');
      a.className = 'card';
      a.href = encodeURI(item.path);
      const badge = item.path.includes('美股') ? '<span class="badge badge-us">US</span>' :
                    item.path.includes('港股') ? '<span class="badge badge-hk">HK</span>' :
                    item.path.includes('日股') ? '<span class="badge badge-jp">JP</span>' :
                    '<span class="badge badge-stock">Stock</span>';
      a.innerHTML = `<div class="card-title">${badge} ${item.name.replace('.html','')}</div>
                     <div class="card-meta">${item.dir}</div>`;
      div.appendChild(a);
    }
    container.appendChild(div);
  }
} else {
  container.innerHTML = '<p class="empty">No dashboards found</p>';
}
</script>

</body>
</html>
