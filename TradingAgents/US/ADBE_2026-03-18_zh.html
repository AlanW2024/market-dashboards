<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADBE — BUY | 2026-03-18</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
/* ─── Custom Properties ─────────────────────────────── */
:root {
    --bg-primary: #0b0f19;
    --bg-secondary: #0f1629;
    --bg-card: #111827;
    --bg-card-hover: #1a2332;
    --bg-inset: #0d1117;
    --border-subtle: #1e293b;
    --border-medium: #334155;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --signal-color: #10b981;
    --signal-glow: rgba(16, 185, 129, 0.15);
    --signal-rgb: 16, 185, 129;
    --font-heading: 'Outfit', sans-serif;
    --font-body: 'Plus Jakarta Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --sidebar-w: 220px;
    --header-h: 56px;
    --radius: 12px;
    --radius-sm: 8px;
}

/* ─── Reset ─────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: calc(var(--header-h) + 1rem); }
body {
    font-family: var(--font-body);
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

/* ─── Noise Texture ─────────────────────────────────── */
body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
}

/* ─── Header Bar ────────────────────────────────────── */
.header-bar {
    position: fixed; top: 0; left: 0; right: 0;
    height: var(--header-h);
    background: rgba(11, 15, 25, 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border-subtle);
    z-index: 100;
    display: flex; align-items: center;
}
.header-inner {
    width: 100%; max-width: 1400px;
    margin: 0 auto; padding: 0 2rem;
    display: flex; align-items: center;
    font-family: var(--font-heading);
    font-weight: 600;
    font-size: 1rem;
    color: var(--text-secondary);
    letter-spacing: 0.01em;
}

/* ─── Signal Pill ───────────────────────────────────── */
.signal-pill {
    display: inline-flex; align-items: center;
    padding: 0.25rem 0.85rem;
    background: rgba(var(--signal-rgb), 0.15);
    border: 1px solid rgba(var(--signal-rgb), 0.3);
    color: var(--signal-color);
    font-family: var(--font-mono);
    font-weight: 500; font-size: 0.8rem;
    border-radius: 20px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
}

/* ─── Layout ────────────────────────────────────────── */
.layout {
    display: flex; max-width: 1400px;
    margin: 0 auto; padding-top: var(--header-h);
    min-height: 100vh;
}

/* ─── Sidebar ───────────────────────────────────────── */
.sidebar {
    position: sticky; top: var(--header-h);
    width: var(--sidebar-w); flex-shrink: 0;
    height: calc(100vh - var(--header-h));
    padding: 1.5rem 0 1.5rem 1.5rem;
    overflow-y: auto;
}
.sidebar-inner {
    display: flex; flex-direction: column; gap: 0.25rem;
}
.nav-link {
    display: block; padding: 0.5rem 1rem;
    color: var(--text-muted); text-decoration: none;
    font-size: 0.85rem; font-weight: 500;
    border-radius: var(--radius-sm);
    border-left: 2px solid transparent;
    transition: all 0.2s ease;
}
.nav-link:hover {
    color: var(--text-secondary);
    background: rgba(255,255,255,0.03);
}
.nav-link.active {
    color: var(--signal-color);
    border-left-color: var(--signal-color);
    background: rgba(var(--signal-rgb), 0.08);
}

/* ─── Main Content ──────────────────────────────────── */
.main-content {
    flex: 1; min-width: 0;
    padding: 1.5rem 2rem 3rem 1.5rem;
    display: flex; flex-direction: column; gap: 1.5rem;
}

/* ─── Hero Card ─────────────────────────────────────── */
.hero-card {
    position: relative;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 2.5rem;
    overflow: hidden;
}
.hero-mesh {
    position: absolute; inset: 0;
    background:
        radial-gradient(ellipse at 20% 50%, rgba(var(--signal-rgb), 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(var(--signal-rgb), 0.05) 0%, transparent 40%),
        radial-gradient(ellipse at 60% 80%, rgba(var(--signal-rgb), 0.03) 0%, transparent 60%);
    pointer-events: none;
}
.hero-content { position: relative; z-index: 1; }
.hero-header {
    display: flex; align-items: center; gap: 1rem;
    flex-wrap: wrap; margin-bottom: 0.5rem;
}
.hero-ticker {
    font-family: var(--font-heading);
    font-size: 2.5rem; font-weight: 700;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--text-primary), var(--signal-color));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.hero-date {
    font-family: var(--font-mono);
    font-size: 0.9rem; color: var(--text-muted);
    margin-bottom: 1.5rem;
}
.hero-card .signal-pill { font-size: 0.9rem; padding: 0.35rem 1rem; }

/* Risk Badge */
.risk-badge {
    display: inline-flex; align-items: center;
    padding: 0.25rem 0.75rem;
    font-family: var(--font-mono);
    font-size: 0.75rem; font-weight: 500;
    border-radius: 20px; letter-spacing: 0.05em;
}
.risk-low    { background: rgba(16,185,129,0.12); color: #10b981; border: 1px solid rgba(16,185,129,0.25); }
.risk-medium { background: rgba(245,158,11,0.12); color: #f59e0b; border: 1px solid rgba(245,158,11,0.25); }
.risk-high   { background: rgba(239,68,68,0.12);  color: #ef4444; border: 1px solid rgba(239,68,68,0.25); }

/* Reasons */
.reasons-list { display: flex; flex-direction: column; gap: 0.75rem; }
.reason {
    display: flex; align-items: flex-start; gap: 0.75rem;
    padding: 0.75rem 1rem;
    background: rgba(var(--signal-rgb), 0.05);
    border: 1px solid rgba(var(--signal-rgb), 0.1);
    border-radius: var(--radius-sm);
    font-size: 0.92rem; color: var(--text-secondary); line-height: 1.5;
}
.reason-num {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    width: 24px; height: 24px;
    background: rgba(var(--signal-rgb), 0.15);
    color: var(--signal-color);
    font-family: var(--font-mono);
    font-size: 0.75rem; font-weight: 500;
    border-radius: 50%;
}

/* ─── Metrics Grid ──────────────────────────────────── */
.metrics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
}
.metric-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 1.25rem;
    transition: all 0.25s ease;
    position: relative; overflow: hidden;
}
.metric-card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--signal-color); opacity: 0.4;
    transition: opacity 0.25s ease;
}
.metric-card:hover {
    border-color: rgba(var(--signal-rgb), 0.3);
    box-shadow: 0 0 20px rgba(var(--signal-rgb), 0.08);
}
.metric-card:hover::before { opacity: 1; }
.metric-label {
    font-size: 0.75rem; font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 0.4rem;
}
.metric-value {
    font-family: var(--font-mono);
    font-size: 1.35rem; font-weight: 500;
    color: var(--text-primary);
}

/* ─── Section Cards ─────────────────────────────────── */
.section-card {
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius);
    padding: 2rem;
    transition: border-color 0.25s ease;
}
.section-card:hover { border-color: var(--border-medium); }
.section-title {
    font-family: var(--font-heading);
    font-size: 1.3rem; font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 1.25rem; padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border-subtle);
    display: flex; align-items: center; gap: 0.5rem;
}
.section-title::before {
    content: ''; display: inline-block;
    width: 4px; height: 20px;
    background: var(--signal-color); border-radius: 2px;
}
.section-body {
    color: var(--text-secondary);
    font-size: 0.92rem; line-height: 1.8;
}
.section-body h1, .section-body h2, .section-body h3 {
    font-family: var(--font-heading);
    color: var(--text-primary); margin: 1.5rem 0 0.75rem;
}
.section-body h1 { font-size: 1.2rem; }
.section-body h2 { font-size: 1.1rem; }
.section-body h3 { font-size: 1rem; }
.section-body p { margin-bottom: 0.75rem; }
.section-body ul, .section-body ol { margin: 0.5rem 0 1rem 1.5rem; }
.section-body li { margin-bottom: 0.3rem; }
.section-body strong { color: var(--text-primary); }
.section-body em { color: var(--text-muted); font-style: italic; }

/* Tables in sections */
.section-body table {
    width: 100%; border-collapse: collapse;
    margin: 1rem 0; font-size: 0.85rem;
    border-radius: var(--radius-sm); overflow: hidden;
}
.section-body thead th {
    background: rgba(var(--signal-rgb), 0.1);
    color: var(--signal-color);
    padding: 0.6rem 0.8rem; text-align: left;
    font-weight: 600; font-family: var(--font-mono);
    font-size: 0.78rem; text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border-subtle);
}
.section-body tbody tr {
    border-bottom: 1px solid var(--border-subtle);
    transition: background 0.15s ease;
}
.section-body tbody tr:hover { background: rgba(255,255,255,0.02); }
.section-body tbody td {
    padding: 0.5rem 0.8rem; color: var(--text-secondary);
}

/* ─── Technical Dashboard ──────────────────────────── */
.tech-dashboard {
    display: flex; flex-direction: column; gap: 1.5rem;
}
.gauges-row {
    display: flex; gap: 1.5rem; flex-wrap: wrap;
    justify-content: center; padding: 0.5rem 0;
}
.gauge-container {
    width: 200px; text-align: center;
    background: var(--bg-inset);
    border-radius: var(--radius-sm);
    padding: 1rem 0.5rem 0.75rem;
}
.gauge-svg { width: 100%; height: auto; }
.charts-row {
    display: grid; grid-template-columns: 1fr; gap: 1rem;
}
.chart-container {
    position: relative; height: 220px;
    background: var(--bg-inset);
    border-radius: var(--radius-sm);
    padding: 1rem;
}

/* ─── MA Comparison Chart ──────────────────────────── */
.ma-chart {
    display: flex; flex-direction: column; gap: 0.6rem;
    background: var(--bg-inset);
    border-radius: var(--radius-sm);
    padding: 1.25rem;
}
.ma-bar-row {
    display: flex; align-items: center; gap: 0.75rem;
}
.ma-label {
    width: 56px; flex-shrink: 0;
    font-family: var(--font-mono); font-size: 0.78rem;
    color: var(--text-muted); text-align: right;
}
.ma-bar-track {
    flex: 1; height: 24px;
    background: rgba(255,255,255,0.03);
    border-radius: 4px; overflow: hidden;
}
.ma-bar-fill {
    height: 100%; border-radius: 4px;
    transition: width 1s ease;
}
.ma-value {
    width: 64px; flex-shrink: 0;
    font-family: var(--font-mono); font-size: 0.85rem;
    color: var(--text-primary); text-align: right;
}

/* ─── KPI Grid ─────────────────────────────────────── */
.kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 0.75rem; margin-bottom: 1.5rem;
}
.kpi-card {
    background: var(--bg-inset);
    border-radius: var(--radius-sm);
    padding: 1rem;
}
.kpi-label {
    font-size: 0.72rem; font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 0.3rem;
}
.kpi-value {
    font-family: var(--font-mono);
    font-size: 1.1rem; font-weight: 600;
}

/* ─── Sentiment Dashboard ──────────────────────────── */
.sentiment-summary { margin-bottom: 1.5rem; }
.sentiment-bar {
    display: flex; height: 28px;
    border-radius: 14px; overflow: hidden;
    background: var(--bg-inset);
}
.sent-fill { transition: width 0.8s ease; min-width: 2px; }
.sent-pos { background: #10b981; }
.sent-neu { background: #475569; }
.sent-neg { background: #ef4444; }
.sentiment-counts {
    display: flex; justify-content: center;
    gap: 1.5rem; margin-top: 0.75rem;
}
.sent-count {
    font-family: var(--font-mono); font-size: 0.8rem;
}
.sent-count-pos { color: #10b981; }
.sent-count-neu { color: #64748b; }
.sent-count-neg { color: #ef4444; }
.sent-tag {
    display: inline-block;
    padding: 0.15rem 0.5rem; border-radius: 10px;
    font-size: 0.78rem; font-weight: 500;
}
.sent-tag-positive { background: rgba(16,185,129,0.15); color: #10b981; }
.sent-tag-negative { background: rgba(239,68,68,0.15); color: #ef4444; }
.sent-tag-neutral { background: rgba(100,116,139,0.15); color: #94a3b8; }
.sent-row-positive td:first-child { border-left: 3px solid #10b981; }
.sent-row-negative td:first-child { border-left: 3px solid #ef4444; }
.sent-row-neutral td:first-child { border-left: 3px solid #475569; }

/* ─── Indicator Table ──────────────────────────────── */
.indicator-table {
    width: 100%; border-collapse: collapse;
    font-size: 0.85rem;
    border-radius: var(--radius-sm); overflow: hidden;
}
.indicator-table thead th {
    background: rgba(var(--signal-rgb), 0.08);
    color: var(--signal-color);
    padding: 0.6rem 0.8rem; text-align: left;
    font-weight: 600; font-family: var(--font-mono);
    font-size: 0.75rem; text-transform: uppercase;
    letter-spacing: 0.05em;
    border-bottom: 1px solid var(--border-subtle);
}
.indicator-table tbody tr {
    border-bottom: 1px solid var(--border-subtle);
    transition: background 0.15s ease;
}
.indicator-table tbody tr:hover { background: rgba(255,255,255,0.02); }
.indicator-table tbody td {
    padding: 0.5rem 0.8rem; color: var(--text-secondary);
}
.ind-name {
    font-family: var(--font-mono); font-weight: 500;
    color: var(--text-primary);
}
.ind-value {
    font-family: var(--font-mono); color: var(--signal-color);
}

/* ─── Debate Comparison ────────────────────────────── */
.debate-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 1rem; margin-bottom: 1rem;
}
.debate-panel {
    background: var(--bg-inset);
    border-radius: var(--radius-sm);
    padding: 1.25rem;
}
.debate-panel-title {
    font-family: var(--font-heading);
    font-size: 1rem; font-weight: 600;
    margin-bottom: 0.75rem;
}
.debate-preview {
    color: var(--text-secondary);
    font-size: 0.88rem; line-height: 1.7;
    max-height: 200px; overflow: hidden;
    mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
}
.debate-preview p { margin-bottom: 0.5rem; }
.debate-preview strong { color: var(--text-primary); }
.debate-expand { margin-top: 0.75rem; }
.debate-expand summary {
    cursor: pointer; color: var(--signal-color);
    font-size: 0.85rem; font-weight: 500;
    padding: 0.4rem 0; user-select: none;
    list-style: none;
}
.debate-expand summary::-webkit-details-marker { display: none; }
.debate-expand summary::before {
    content: '\25B8 '; font-size: 0.75rem;
    transition: transform 0.2s ease;
    display: inline-block;
}
.debate-expand[open] summary::before { transform: rotate(90deg); }
.debate-full {
    color: var(--text-secondary);
    font-size: 0.88rem; line-height: 1.7;
    margin-top: 0.75rem;
    max-height: 600px; overflow-y: auto;
}
.debate-full p { margin-bottom: 0.5rem; }
.debate-full strong { color: var(--text-primary); }
.debate-full ul, .debate-full ol { margin: 0.5rem 0 0.75rem 1.5rem; }
.debate-full li { margin-bottom: 0.3rem; }

/* ─── Judge Decision ───────────────────────────────── */
.judge-decision {
    background: var(--bg-inset);
    border-radius: var(--radius-sm);
    padding: 1.5rem;
    border-left: 3px solid var(--signal-color);
}
.judge-title {
    font-family: var(--font-heading);
    font-size: 1rem; font-weight: 600;
    color: var(--signal-color);
    margin-bottom: 0.75rem;
}
.judge-body {
    color: var(--text-secondary);
    font-size: 0.9rem; line-height: 1.7;
}
.judge-body p { margin-bottom: 0.5rem; }
.judge-body strong { color: var(--text-primary); }
.judge-body ul, .judge-body ol { margin: 0.5rem 0 0.75rem 1.5rem; }
.judge-body li { margin-bottom: 0.3rem; }

/* ─── Tabs (legacy fallback) ───────────────────────── */
.tab-bar {
    display: flex; gap: 0.25rem;
    border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 1.25rem;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.tab-btn {
    padding: 0.6rem 1.25rem; background: none; border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    font-family: var(--font-body);
    font-size: 0.88rem; font-weight: 500;
    cursor: pointer; white-space: nowrap;
    transition: all 0.2s ease;
}
.tab-btn:hover { color: var(--text-secondary); }
.tab-btn.active {
    color: var(--signal-color);
    border-bottom-color: var(--signal-color);
}
.tab-panel {
    display: none; color: var(--text-secondary);
    font-size: 0.92rem; line-height: 1.8;
}
.tab-panel.active { display: block; animation: fadeIn 0.3s ease; }
.tab-panel p { margin-bottom: 0.75rem; }
.tab-panel strong { color: var(--text-primary); }
.tab-panel ul, .tab-panel ol { margin: 0.5rem 0 1rem 1.5rem; }
.tab-panel li { margin-bottom: 0.3rem; }
.text-muted { color: var(--text-muted); font-style: italic; }

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* ─── Collapsible Debate Rounds ─────────────────────── */
.debate-round {
    margin: 0.5rem 0;
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    overflow: hidden; transition: border-color 0.2s ease;
}
.debate-round[open] { border-color: rgba(var(--signal-rgb), 0.2); }
.debate-round summary {
    padding: 0.7rem 1rem; background: var(--bg-inset);
    cursor: pointer; font-weight: 600; font-size: 0.88rem;
    color: var(--text-secondary); list-style: none;
    display: flex; align-items: center; gap: 0.5rem;
    transition: all 0.2s ease; user-select: none;
}
.debate-round summary::-webkit-details-marker { display: none; }
.debate-round summary::before {
    content: '\25B8'; font-size: 0.75rem;
    color: var(--text-muted); transition: transform 0.2s ease;
}
.debate-round[open] summary::before { transform: rotate(90deg); }
.debate-round summary:hover {
    background: rgba(255,255,255,0.03); color: var(--text-primary);
}
.round-content {
    padding: 1rem; border-top: 1px solid var(--border-subtle);
    color: var(--text-secondary); font-size: 0.9rem; line-height: 1.7;
}
.round-content p { margin-bottom: 0.6rem; }
.round-content strong { color: var(--text-primary); }
.round-content ul, .round-content ol { margin: 0.5rem 0 0.75rem 1.5rem; }

/* ─── Footer ────────────────────────────────────────── */
.dashboard-footer {
    text-align: center; padding: 2rem;
    color: var(--text-muted); font-size: 0.8rem;
    font-family: var(--font-mono);
    border-top: 1px solid var(--border-subtle);
    margin-top: 1rem;
}

/* ─── Responsive ────────────────────────────────────── */
@media (max-width: 768px) {
    .sidebar {
        position: fixed; top: var(--header-h);
        left: 0; right: 0; width: 100%;
        height: auto; padding: 0.5rem;
        background: rgba(11, 15, 25, 0.95);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--border-subtle);
        z-index: 90; overflow-x: auto; overflow-y: hidden;
    }
    .sidebar-inner {
        flex-direction: row; gap: 0; min-width: max-content;
    }
    .nav-link {
        border-left: none;
        border-bottom: 2px solid transparent;
        padding: 0.4rem 0.75rem; font-size: 0.78rem;
        white-space: nowrap;
    }

<script>
(function() {
    // ─── Tab Switching (legacy fallback) ────────────
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var container = btn.closest('.tabs-container');
            var tabId = btn.getAttribute('data-tab');
            container.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
            container.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
            btn.classList.add('active');
            var panel = container.querySelector('[data-panel="' + tabId + '"]');
            if (panel) panel.classList.add('active');
        });
    });

    // ─── Smooth Scroll from Nav ─────────────────────
    document.querySelectorAll('.nav-link').forEach(function(link) {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            var id = link.getAttribute('href').slice(1);
            var el = document.getElementById(id);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
    });

    // ─── IntersectionObserver for Nav Tracking ──────
    var navLinks = document.querySelectorAll('.nav-link');
    var sections = [];
    navLinks.forEach(function(link) {
        var id = link.getAttribute('data-section');
        var el = document.getElementById(id);
        if (el) sections.push({ id: id, el: el });
    });

    if (sections.length && 'IntersectionObserver' in window) {
        var currentActive = null;
        var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) {
                    currentActive = entry.target.id;
                }
            });
            if (currentActive) {
                navLinks.forEach(function(l) {
                    if (l.getAttribute('data-section') === currentActive) {
                        l.classList.add('active');
                    } else {
                        l.classList.remove('active');
                    }
                });
            }
        }, {
            rootMargin: '-80px 0px -60% 0px',
            threshold: 0
        });
        sections.forEach(function(s) { observer.observe(s.el); });
    }
})();
</script>
