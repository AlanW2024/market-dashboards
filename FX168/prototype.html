<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FX168 Terminal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#020617;--bg-panel:#0a0f1e;--bg-card:#0e1223;--bg-hover:#141b30;
  --border:#1e293b;--border-hi:#334155;
  --text:#e2e8f0;--text-muted:#64748b;--text-dim:#475569;
  --green:#22c55e;--red:#ef4444;--amber:#ffb000;--blue:#3b82f6;--cyan:#06b6d4;
  --font-mono:'JetBrains Mono',monospace;--font-sans:'Inter',sans-serif;
}
html{font-size:13px}
body{background:var(--bg);color:var(--text);font-family:var(--font-mono);overflow-x:hidden}

/* ── TICKER BAR ── */
.ticker-bar{background:#000;border-bottom:1px solid var(--amber);padding:4px 0;overflow:hidden;white-space:nowrap}
.ticker-bar .track{display:inline-block;animation:scroll 40s linear infinite}
.ticker-bar .item{display:inline-block;padding:0 24px;font-size:11px;letter-spacing:.5px}
.ticker-bar .item .label{color:var(--amber);margin-right:6px}
.ticker-bar .item .val{color:var(--text)}
@keyframes scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* ── HEADER ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg-panel)}
.header .logo{font-size:16px;font-weight:700;color:var(--amber);letter-spacing:2px}
.header .logo span{color:var(--text-muted);font-weight:400;font-size:11px;margin-left:8px}
.header .meta{font-size:11px;color:var(--text-muted)}
.header .meta .live{color:var(--green);margin-right:4px}

/* ── GRID LAYOUT ── */
.grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:1px;background:var(--border);margin:0}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.panel{background:var(--bg-panel);padding:10px 12px}
.panel-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--amber);margin-bottom:8px;font-weight:500}
.panel-full{grid-column:1/-1}

/* ── KPI CARDS ── */
.kpi{text-align:center;padding:12px 8px}
.kpi .value{font-size:28px;font-weight:700;line-height:1}
.kpi .label{font-size:10px;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.kpi .sub{font-size:11px;margin-top:2px}

/* ── SPARKLINE ── */
.spark-container{position:relative;height:100px;margin-top:4px}
.spark-container svg{width:100%;height:100%}

/* ── SENTIMENT BAR ── */
.sent-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.sent-chip{font-size:10px;padding:2px 6px;border:1px solid var(--border-hi);color:var(--text-muted);display:inline-flex;align-items:center;gap:4px}
.sent-chip .cnt{color:var(--text);font-weight:500}
.sent-chip.bull{border-color:rgba(34,197,94,.3);color:var(--green)}
.sent-chip.bear{border-color:rgba(239,68,68,.3);color:var(--red)}

/* ── THEME TAGS ── */
.theme-row{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
.theme-tag{font-size:10px;padding:1px 5px;background:var(--bg-card);border:1px solid var(--border);color:var(--text-dim)}
.theme-tag .n{color:var(--amber);margin-left:3px}

/* ── CALENDAR ── */
.cal-list{max-height:200px;overflow-y:auto}
.cal-item{display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid rgba(30,41,59,.5);font-size:11px}
.cal-item.past{opacity:.35}
.cal-item .date{color:var(--cyan);width:80px;flex-shrink:0}
.cal-item .stars{color:var(--amber);width:36px;flex-shrink:0}
.cal-item .country{color:var(--text-muted);width:40px;flex-shrink:0}
.cal-item .name{color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── ARTICLE TABLE ── */
.article-table{width:100%;border-collapse:collapse;font-size:11px}
.article-table th{text-align:left;color:var(--amber);font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:4px 6px;border-bottom:1px solid var(--border-hi);font-weight:500;position:sticky;top:0;background:var(--bg-panel);z-index:1}
.article-table td{padding:4px 6px;border-bottom:1px solid rgba(30,41,59,.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:0}
.article-table td:first-child{max-width:none;white-space:normal;word-break:break-all}
.article-table tr:hover td{background:var(--bg-hover)}
.article-table .title-cell{color:var(--text);cursor:pointer;font-family:var(--font-sans);font-size:12px}
.article-table .title-cell:hover{color:var(--amber)}
.article-table .date-cell{color:var(--text-muted);width:90px}
.article-table .sent-cell{width:100px}
.article-table .author-cell{color:var(--text-dim);width:80px}
.article-scroll{max-height:400px;overflow-y:auto}

/* ── SEARCH ── */
.search-bar{display:flex;gap:8px;margin-bottom:8px}
.search-bar input{flex:1;background:var(--bg-card);border:1px solid var(--border);color:var(--text);padding:5px 8px;font-family:var(--font-mono);font-size:12px;outline:none}
.search-bar input:focus{border-color:var(--amber)}
.search-bar select{background:var(--bg-card);border:1px solid var(--border);color:var(--text-muted);padding:5px 6px;font-family:var(--font-mono);font-size:11px;outline:none}

/* ── CLUSTER PANEL ── */
.cluster-card{padding:6px 8px;border:1px solid var(--border);margin-bottom:4px;cursor:default}
.cluster-card:hover{border-color:var(--amber);background:var(--bg-hover)}
.cluster-card .cl-name{color:var(--text);font-size:12px;font-family:var(--font-sans)}
.cluster-card .cl-count{color:var(--amber);font-size:11px;float:right}
.cluster-card .cl-sent{font-size:10px;color:var(--text-muted);margin-top:2px}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;justify-content:center;align-items:center}
.modal-overlay.active{display:flex}
.modal-box{background:var(--bg-panel);border:1px solid var(--amber);max-width:700px;width:90%;max-height:85vh;overflow-y:auto;padding:16px}
.modal-box .modal-title{color:var(--amber);font-size:14px;font-family:var(--font-sans);font-weight:600;margin-bottom:8px}
.modal-box .modal-meta{color:var(--text-muted);font-size:11px;margin-bottom:12px}
.modal-box .modal-body{color:var(--text);font-size:12px;font-family:var(--font-sans);line-height:1.6}
.modal-box .modal-close{float:right;color:var(--amber);cursor:pointer;font-size:14px;border:1px solid var(--amber);padding:0 6px;background:none}
.modal-box .modal-close:hover{background:var(--amber);color:#000}

/* ── FOOTER ── */
.footer{text-align:center;padding:6px;font-size:10px;color:var(--text-dim);border-top:1px solid var(--border)}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border-hi)}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .grid{grid-template-columns:1fr 1fr}
  .grid-3{grid-template-columns:1fr}
}
@media(max-width:600px){
  .grid,.grid-2,.grid-3{grid-template-columns:1fr}
  html{font-size:12px}
}
</style>
</head>
<body>

<!-- TICKER BAR -->
<div class="ticker-bar">
  <div class="track" id="ticker"></div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="logo">FX168<span>TERMINAL</span></div>
  <div class="meta"><span class="live">●</span> <span id="headerTime"></span></div>
</div>

<!-- ROW 1: KPI -->
<div class="grid" id="kpiRow"></div>

<!-- ROW 2: SPARKLINE + CALENDAR -->
<div class="grid grid-2">
  <div class="panel">
    <div class="panel-title">7-Day Volume</div>
    <div class="spark-container"><svg id="sparkSvg"></svg></div>
  </div>
  <div class="panel">
    <div class="panel-title">Economic Calendar</div>
    <div class="cal-list" id="calList"></div>
  </div>
</div>

<!-- ROW 3: SENTIMENT + THEMES + CLUSTERS -->
<div class="grid grid-3">
  <div class="panel">
    <div class="panel-title">Sentiment Distribution</div>
    <div class="sent-row" id="sentRow"></div>
  </div>
  <div class="panel">
    <div class="panel-title">Top Themes</div>
    <div class="theme-row" id="themeRow"></div>
  </div>
  <div class="panel">
    <div class="panel-title">Clusters</div>
    <div id="clusterList" style="max-height:180px;overflow-y:auto"></div>
  </div>
</div>

<!-- ROW 4: ARTICLE TABLE -->
<div class="grid">
  <div class="panel panel-full">
    <div class="panel-title">Articles Feed</div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search title / keyword...">
      <select id="sentFilter"><option value="">ALL SENTIMENT</option></select>
      <select id="themeFilter"><option value="">ALL THEMES</option></select>
    </div>
    <div class="article-scroll">
      <table class="article-table">
        <thead><tr><th>Title</th><th>Date</th><th>Sentiment</th><th>Author</th></tr></thead>
        <tbody id="articleBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">FX168 TERMINAL — Data from fx168news.com — Updated <span id="footerTime"></span></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-meta" id="modalMeta"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="data.js"></script>
<script>
const D = window.FX168_DATA;
const $ = s => document.getElementById(s);

// ── HEADER TIME ──
$('headerTime').textContent = D.generated_at?.replace('T',' ') || '';
$('footerTime').textContent = D.generated_at?.replace('T',' ') || '';

// ── TICKER ──
(function(){
  const themes = (D.top_themes||[]).slice(0,15);
  let html = '';
  for(const [t,c] of themes) html += `<span class="item"><span class="label">${t.toUpperCase()}</span><span class="val">${c}</span></span>`;
  // duplicate for seamless loop
  $('ticker').innerHTML = html + html;
})();

// ── KPI ──
(function(){
  const items = [
    {label:'Total Articles',value:D.total,color:'var(--amber)'},
    {label:'Today',value:D.today,color:'var(--green)',sub:`+${D.today}`},
    {label:`${D.recent_days}D Window`,value:D.recent_count,color:'var(--cyan)'},
    {label:'Summaries',value:D.total,color:'var(--text)'},
  ];
  $('kpiRow').innerHTML = items.map(i=>
    `<div class="panel kpi"><div class="value" style="color:${i.color}">${i.value.toLocaleString()}</div><div class="label">${i.label}</div>${i.sub?`<div class="sub" style="color:var(--green)">${i.sub}</div>`:''}</div>`
  ).join('');
})();

// ── SPARKLINE ──
(function(){
  const svg = $('sparkSvg');
  const data = D.sparkline_7d || {};
  const entries = Object.entries(data).sort();
  if(!entries.length) return;
  const vals = entries.map(e=>e[1]);
  const maxV = Math.max(...vals,1);

  requestAnimationFrame(()=>{
    const W = svg.clientWidth || 300;
    const H = 80;
    const pad = {l:35,r:35,t:8,b:20};
    const pw = W-pad.l-pad.r, ph = H-pad.t-pad.b;
    svg.setAttribute('viewBox',`0 0 ${W} ${H}`);

    const pts = entries.map((e,i)=>{
      const x = pad.l + (i/(entries.length-1))*pw;
      const y = pad.t + ph - (e[1]/maxV)*ph;
      return {x,y,date:e[0],val:e[1]};
    });

    // gradient
    let defs = `<defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--green)" stop-opacity=".3"/><stop offset="100%" stop-color="var(--green)" stop-opacity="0"/></linearGradient></defs>`;

    // area
    const line = pts.map((p,i)=>`${i?'L':'M'}${p.x},${p.y}`).join(' ');
    const area = `${line} L${pts[pts.length-1].x},${pad.t+ph} L${pts[0].x},${pad.t+ph} Z`;

    // bars
    const barW = pw/entries.length*.6;
    const bars = pts.map(p=>
      `<rect x="${p.x-barW/2}" y="${p.y}" width="${barW}" height="${pad.t+ph-p.y}" fill="var(--green)" opacity=".15"/>`
    ).join('');

    // labels
    const labels = pts.map(p=>
      `<text x="${p.x}" y="${H-2}" text-anchor="middle" font-size="9" fill="var(--text-dim)" font-family="var(--font-mono)">${p.date.slice(5)}</text>
       <text x="${p.x}" y="${p.y-5}" text-anchor="middle" font-size="9" fill="var(--green)" font-family="var(--font-mono)">${p.val}</text>`
    ).join('');

    svg.innerHTML = `${defs}${bars}<path d="${area}" fill="url(#sg)"/><path d="${line}" fill="none" stroke="var(--green)" stroke-width="1.5"/>${labels}`;
  });
})();

// ── CALENDAR ──
(function(){
  const cal = D.calendar;
  if(!cal||!cal.events){$('calList').innerHTML='<div style="color:var(--text-dim);font-size:11px">No calendar data</div>';return;}
  const today = new Date().toISOString().slice(0,10);
  const stars = n => '★'.repeat(n) + '☆'.repeat(3-n);
  $('calList').innerHTML = cal.events.slice(0,30).map(e=>{
    const past = e.pubDate && e.pubDate < today;
    return `<div class="cal-item${past?' past':''}">
      <span class="date">${(e.pubDate||'TBD').slice(5)}</span>
      <span class="stars">${stars(e.star||0)}</span>
      <span class="country">${e.countryName||''}</span>
      <span class="name">${e.eventName||''}</span>
    </div>`;
  }).join('');
})();

// ── SENTIMENT ──
(function(){
  const sd = D.sentiment_dist||{};
  const sorted = Object.entries(sd).sort((a,b)=>b[1]-a[1]).slice(0,20);
  $('sentRow').innerHTML = sorted.map(([s,c])=>{
    const cls = s.includes('bullish')?'bull':s.includes('bearish')||s.includes('warning')?'bear':'';
    return `<span class="sent-chip ${cls}"><span class="cnt">${c}</span>${s.replace(/_/g,' ')}</span>`;
  }).join('');
})();

// ── THEMES ──
(function(){
  const th = D.top_themes||[];
  $('themeRow').innerHTML = th.slice(0,25).map(([t,c])=>
    `<span class="theme-tag">${t}<span class="n">${c}</span></span>`
  ).join('');
})();

// ── CLUSTERS ──
(function(){
  const cl = D.clusters||{};
  $('clusterList').innerHTML = Object.entries(cl).map(([name,info])=>{
    const topSent = Object.entries(info.sentiment||{}).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([s,c])=>s.replace(/_/g,' ')).join(', ');
    return `<div class="cluster-card"><span class="cl-name">${name}</span><span class="cl-count">${info.count||0}</span><div class="cl-sent">${topSent}</div></div>`;
  }).join('');
})();

// ── ARTICLES ──
const articles = D.articles||[];
let filtered = [...articles];

function populateFilters(){
  const sents = new Set(), themes = new Set();
  articles.forEach(a=>{
    try{const s=JSON.parse(a.sentiment||'[]');s.forEach(x=>sents.add(x))}catch{}
    try{const t=JSON.parse(a.themes||'[]');t.forEach(x=>themes.add(x))}catch{}
  });
  const sf=$('sentFilter'),tf=$('themeFilter');
  [...sents].sort().forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s.replace(/_/g,' ');sf.appendChild(o)});
  [...themes].sort().forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;tf.appendChild(o)});
}

function renderArticles(){
  const q = $('searchInput').value.toLowerCase();
  const sf = $('sentFilter').value;
  const tf = $('themeFilter').value;

  filtered = articles.filter(a=>{
    if(q && !(a.title||'').toLowerCase().includes(q) && !(a.keywords||'').toLowerCase().includes(q)) return false;
    if(sf){try{if(!JSON.parse(a.sentiment||'[]').includes(sf))return false}catch{return false}}
    if(tf){try{if(!JSON.parse(a.themes||'[]').includes(tf))return false}catch{return false}}
    return true;
  });

  $('articleBody').innerHTML = filtered.slice(0,100).map((a,i)=>{
    let sentBadges = '';
    try{
      const ss = JSON.parse(a.sentiment||'[]');
      sentBadges = ss.slice(0,2).map(s=>{
        const cls = s.includes('bullish')?'color:var(--green)':s.includes('bearish')||s.includes('warning')?'color:var(--red)':'color:var(--text-dim)';
        return `<span style="${cls};font-size:10px">${s.replace(/_/g,' ')}</span>`;
      }).join(' ');
    }catch{}
    return `<tr onclick="showModal(${i})">
      <td class="title-cell">${escHtml(a.title||'')}</td>
      <td class="date-cell">${(a.published_at||'').slice(0,10)}</td>
      <td class="sent-cell">${sentBadges}</td>
      <td class="author-cell">${escHtml(a.author||'')}</td>
    </tr>`;
  }).join('');
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function showModal(i){
  const a = filtered[i]; if(!a) return;
  $('modalTitle').textContent = a.title||'';
  $('modalMeta').textContent = `${a.published_at||''} · ${a.author||''} · ${a.url_code||''}`;
  $('modalBody').textContent = a.core_claim || a.actionable || '(No summary available)';
  $('modal').classList.add('active');
}
function closeModal(){$('modal').classList.remove('active')}
$('modal').addEventListener('click',e=>{if(e.target===$('modal'))closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

$('searchInput').addEventListener('input',renderArticles);
$('sentFilter').addEventListener('change',renderArticles);
$('themeFilter').addEventListener('change',renderArticles);

populateFilters();
renderArticles();
</script>
</body>
</html>
